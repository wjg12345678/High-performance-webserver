version: '3.8'

services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: qgydb
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 3s
      retries: 10

  server:
    build: .
    ports:
      - "9006:9006"
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - ./config:/app/config
      - ./resources:/app/resources

volumes:
  mysql_data:
