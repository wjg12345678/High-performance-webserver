services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: qgydb
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 3s
      retries: 10

  server:
    build: .
    ports:
      - "9006:9006"
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - ./config:/app/config
      - ./resources:/app/resources

  bench:
    build: .
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        # 编译 webbench
        cd /app/tools/benchmarks/test_pressure/webbench-1.5
        make clean && make CFLAGS="-Wall -W -O -I/usr/include/tirpc" 2>/dev/null

        echo ""
        echo "╔══════════════════════════════════════════════╗"
        echo "║            压测环境报告                      ║"
        echo "╠══════════════════════════════════════════════╣"
        echo ""

        echo "── 系统信息 ──"
        echo "  OS:        $$(cat /etc/os-release | grep PRETTY_NAME | cut -d'"' -f2)"
        echo "  Kernel:    $$(uname -r)"
        echo "  Arch:      $$(uname -m)"
        echo ""

        echo "── 硬件资源 ──"
        echo "  CPU 核数:  $$(nproc)"
        echo "  CPU 型号:  $$(grep 'model name' /proc/cpuinfo | head -1 | cut -d: -f2 | xargs)"
        echo "  内存总量:  $$(free -h | awk '/Mem:/{print $$2}')"
        echo "  可用内存:  $$(free -h | awk '/Mem:/{print $$7}')"
        echo ""

        echo "── 容器资源限制 ──"
        CPU_QUOTA=$$(cat /sys/fs/cgroup/cpu.max 2>/dev/null || echo "无限制")
        MEM_LIMIT=$$(cat /sys/fs/cgroup/memory.max 2>/dev/null || echo "无限制")
        echo "  CPU 配额:  $${CPU_QUOTA}"
        echo "  内存限制:  $${MEM_LIMIT}"
        echo ""

        echo "── 服务配置 (server.conf) ──"
        echo "  thread_num:   $$(grep thread_num /app/config/server.conf | cut -d= -f2)"
        echo "  reactor_num:  $$(grep reactor_num /app/config/server.conf | cut -d= -f2)"
        echo "  trig_mode:    $$(grep trig_mode /app/config/server.conf | cut -d= -f2)"
        echo "  sql_num:      $$(grep sql_num /app/config/server.conf | cut -d= -f2)"
        echo ""

        echo "── 数据库 ──"
        DB_HOST=$$(grep db_host /app/config/server.conf | cut -d= -f2)
        echo "  db_host:   $${DB_HOST}"
        echo "  部署方式:  Docker Compose 同网络 (容器间通信)"
        echo ""

        echo "── 静态资源 ──"
        echo "  资源目录:  $$(du -sh /app/resources/www/ | cut -f1)"
        echo "  默认首页:  $$(wc -c < /app/resources/www/judge.html 2>/dev/null || echo N/A) bytes"
        echo ""

        echo "── 压测参数 ──"
        echo "  工具:      webbench 1.5"
        echo "  目标:      http://server:9006/"
        echo "  并发数:    $${CLIENTS}"
        echo "  持续时间:  $${DURATION}s"
        echo ""
        echo "╠══════════════════════════════════════════════╣"
        echo "║            开始压测...                       ║"
        echo "╚══════════════════════════════════════════════╝"
        echo ""

        ./webbench -c $${CLIENTS} -t $${DURATION} http://server:9006/

        echo ""
        echo "══════════════════════════════════════════════"
        echo "  压测完成 @ $$(date '+%Y-%m-%d %H:%M:%S')"
        echo "══════════════════════════════════════════════"
        echo ""
        echo "-- TIP: 运行以下命令查看运行时指标 --"
        echo "docker-compose exec server kill -USR1 1"
        echo "docker-compose logs server --tail=15"
    environment:
      CLIENTS: ${CLIENTS:-500}
      DURATION: ${DURATION:-30}
    volumes:
      - ./config:/app/config
    depends_on:
      - server
    profiles:
      - bench

volumes:
  mysql_data:
